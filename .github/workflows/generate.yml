name: Generate ProtoBuf

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Gen Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Install Protobuf Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Go Protobuf Tools
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.33.0
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.3.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Clone Source Repo
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/fipaan/ap2-uni.git source-repo

      - name: Generate Go Code from Proto Files
        run: |
          cd source-repo

          echo "Cleaning up old generated files..."
          find . -name "*.pb.go" -delete

          echo "Generating .pb.go and _grpc.pb.go files..."
          find op-assign -name "*.proto" -print0 | xargs -0 -n1 protoc -I. --go_out=paths=source_relative:. --go-grpc_out=paths=source_relative:.

          echo "Generated files:"
          find . -name "*.pb.go"

          if [ -z "$(find . -name '*.pb.go')" ]; then
            echo "Error: No .pb.go files were generated."
            exit 1
          fi

      - name: Sync Generated Code into Gen Repo
        run: |
          cd source-repo

          find . -name "*.pb.go" | while read -r file; do
            target="../$(dirname "$file")"
            mkdir -p "$target"
            cp "$file" "$target/"
          done

      - name: Commit and Push Changes
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "Fipaan"
          git config user.email "fipaan@proton.me"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Regenerate protobuf Go files"
          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/fipaan/ap2-uni-op-gen.git
          git push origin main
